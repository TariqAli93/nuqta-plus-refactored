appId: com.nuqtaplus.client
productName: 'NuqtaPlus Client'
asar: true

files:
  - package.json
  - dist-electron/**/*
  - '!**/*.map'
  - '!**/.env*'

extraResources:
  - from: dist-electron
    to: dist-electron
    filter:
      - '**/*'

  - from: ./splash.html
    to: dist-electron/dist/splash.html

  - from: ./electron/scripts
    to: dist-electron/scripts

directories:
  buildResources: build
  output: ../release-client

publish:
  - provider: github
    owner: TariqAli93
    repo: nuqta-plus-refactored
    releaseType: release

win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: NuqtaPlus-Client-Setup-${version}.exe

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 'NuqtaPlus Client'
  installerHeader: build/installer-header.bmp
  installerSidebar: build/installer-sidebar.bmp
  uninstallerIcon: build/icon.ico
  uninstallDisplayName: 'NuqtaPlus Client'
  license: build/license.md
  unicode: true
  include: ../scripts/installer-include.nsh
