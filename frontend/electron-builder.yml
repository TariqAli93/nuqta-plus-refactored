appId: com.nuqtaplus.server
productName: 'NuqtaPlus Server'
asar: true

files:
  - package.json
  - dist-electron/**/*
  - '!**/*.map'
  - '!**/.env*'

extraResources:
  - from: dist-electron
    to: dist-electron
    filter:
      - '**/*'

  - from: ./splash.html
    to: dist-electron/dist/splash.html

  - from: ./electron/scripts
    to: dist-electron/scripts

  # Credit-risk model artifacts — the production runtime resolves these via
  # process.resourcesPath (see backend/src/utils/modelPathResolver.js). They
  # are also placed under resources/backend/models by afterPack via dist-backend,
  # so this entry is a safety net in case afterPack is ever bypassed.
  - from: ../backend/models/credit-score.onnx
    to: backend/models/credit-score.onnx
  - from: ../backend/models/credit-score.meta.json
    to: backend/models/credit-score.meta.json

afterPack: ../scripts/afterPack.cjs

directories:
  buildResources: build
  output: ../release

publish:
  - provider: github
    owner: TariqAli93
    repo: nuqta-plus-refactored
    releaseType: release

win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: NuqtaPlus-Server-Setup-${version}.exe

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 'NuqtaPlus'
  installerHeader: build/installer-header.bmp
  installerSidebar: build/installer-sidebar.bmp
  uninstallerIcon: build/icon.ico
  uninstallDisplayName: 'NuqtaPlus'
  license: build/license.md
  unicode: true
  include: ../scripts/installer-include.nsh
